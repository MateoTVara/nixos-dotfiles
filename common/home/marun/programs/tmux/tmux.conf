# set -g default-terminal "xterm-kitty"
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g mouse on
set -g set-clipboard on

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Custom maps
# bind k confirm-before -p "Kill session #S? (y/n)" kill-session
bind k confirm-before -p "Kill session #S? (y/n)" kill-session

# Split windows (opens in same directory as current pane)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

# Alt+hjkl to switch panes without prefix (vim style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Start numbergin at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Swap window position with previous/next window and move with it
bind -n M-S-Left swap-window -t -1\; select-window -t -1
bind -n M-S-Right swap-window -t +1\; select-window -t +1

# Posibble mouse wheel scroll
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
# bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "send-keys -M"

# Cursor style
set -g cursor-style blinking-bar

# Catppuccin Mocha Color Schema
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_red="#f38ba8"
thm_green="#a6e3a1"
thm_yellow="#f9e2af"
thm_blue="#89b4fa"
thm_magenta="#cba6f7"
thm_cyan="#89dceb"
thm_orange="#fab387"
thm_pink="#f5c2e7"
thm_teal="#94e2d5"
thm_lavender="#b4befe"
thm_gray="#3a3f5a"
thm_crust="#11111b"
thm_mantle="#181825"

# Status line
set -g status-style "bg=$thm_bg,fg=$thm_fg"

# Icons: ¯¡┐ ¯¼ú ¯»ê ¯¡░ ´Éô ´Çç ¾░Æï ¾░â░ ¯Şó ¯Şò
# Filler Icons: ¯éÂ ¯é┤ ¯é▓ ¯é░ Ôûê Ôûë Ôûè Ôûï Ôûî Ôûı ÔûÄ ÔûÅ

# Left side
set -g status-left ""

# Right side
set -g status-right "\
  #[fg=$thm_lavender]¯éÂ#[bg=$thm_lavender,fg=$thm_bg]¯¡┐ #[bold,fg=$thm_fg,bg=$thm_gray]  #W\
  #{?client_prefix,#[fg=$thm_red],#[fg=$thm_cyan]}¯éÂ#{?client_prefix,#[bg=$thm_red],#[bg=$thm_cyan]}#[fg=$thm_bg]¯»ê #[bold,fg=$thm_fg,bg=$thm_gray]  #S  "

# Inactive windows
set -g window-status-format " #[fg=$thm_blue]#I: #[fg=$thm_fg]#W "

# Active window
set -g window-status-current-format " #[fg=$thm_blue]#I: #[fg=$thm_pink]¯¡░ #[bold,fg=$thm_cyan]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) "

# Pane border colors
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=$thm_blue"

# Message styling
set -g message-style "bg=$thm_bg,fg=$thm_fg"
